name: Upstream sync

# Opens a daily PR bringing new commits from the original repo (FerroxLabs/wayland)
# into this fork's main. It NEVER force-pushes main — this fork has diverged (its own
# CI, features, PRs), so a plain `gh repo sync --force` would destroy that work.
# Instead a throwaway branch (automated/upstream-sync) is fast-forwarded to upstream/main
# and a PR is opened, so any conflicts are resolved through normal review before merge.
#
# Idempotent: if upstream has nothing new it exits quietly; if a sync PR is already open
# it just updates the branch; otherwise it opens a fresh PR.
#
# Note: PRs opened with the default GITHUB_TOKEN do NOT trigger other workflows (CI).
# To run CI on the sync PR, add a fine-grained SYNC_PAT limited to this repository
# with Contents and Pull requests write access. It is exposed only to the API step.

on:
  schedule:
    - cron: '0 7 * * *' # daily 07:00 UTC (GitHub cron can lag up to ~1h)

concurrency:
  group: upstream-sync
  cancel-in-progress: false
  queue: max

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM: FerroxLabs/wayland
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: automated/upstream-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          behind=$(git rev-list --count "origin/${TARGET_BRANCH}..upstream/${UPSTREAM_BRANCH}")
          if [ "$behind" -eq 0 ]; then
            echo "Fork is already up to date with ${UPSTREAM}@${UPSTREAM_BRANCH}. Nothing to do."
            exit 0
          fi
          echo "${behind} new upstream commit(s) to sync."

          # Point the throwaway sync branch at upstream's immutable commit via
          # the GitHub API, keeping the write credential out of git config.
          UPSTREAM_SHA="$(git rev-parse "upstream/${UPSTREAM_BRANCH}^{commit}")"
          if [[ ! "$UPSTREAM_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Upstream did not resolve to an immutable commit." >&2
            exit 1
          fi
          if gh api "repos/$REPOSITORY/git/ref/heads/$SYNC_BRANCH" >/dev/null 2>&1; then
            gh api --method PATCH "repos/$REPOSITORY/git/refs/heads/$SYNC_BRANCH" \
              -f sha="$UPSTREAM_SHA" -F force=true >/dev/null
          else
            gh api --method POST "repos/$REPOSITORY/git/refs" \
              -f ref="refs/heads/$SYNC_BRANCH" -f sha="$UPSTREAM_SHA" >/dev/null
          fi

          if [ -n "$(gh pr list --head "${SYNC_BRANCH}" --base "${TARGET_BRANCH}" --state open --json number --jq '.[].number')" ]; then
            echo "Sync PR already open — branch updated, PR will refresh automatically."
            exit 0
          fi

          gh pr create \
            --base "${TARGET_BRANCH}" \
            --head "${SYNC_BRANCH}" \
            --title "chore: sync from upstream ${UPSTREAM}" \
            --body "Automated daily sync: ${behind} new commit(s) from \`${UPSTREAM}@${UPSTREAM_BRANCH}\`. Review and resolve any conflicts before merging. This fork has its own changes, so do **not** force-overwrite main."
