name: Build and Release
run-name: Release ${{ github.event.client_payload.tag }}

# Production secrets are reachable only from this default-branch dispatch
# workflow. A pushed tag never supplies the workflow definition.
permissions: {}

on:
  repository_dispatch:
    types: [stable-release]

concurrency:
  # One stable-release chain at a time keeps npm promotion and GitHub's latest
  # marker ordered across different tags.
  group: stable-release
  cancel-in-progress: false
  queue: max

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  validate-release-ref:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.validate.outputs.version }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
      release_tag: ${{ steps.validate.outputs.release_tag }}
      release_sha: ${{ steps.validate.outputs.release_sha }}
    steps:
      - name: Validate requested tag syntax
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
          EXPECTED_SHA: ${{ github.event.client_payload.expected_sha }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error title=Invalid release tag::Expected strict vMAJOR.MINOR.PATCH SemVer with an optional prerelease suffix."
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            IFS='.' read -r -a PRERELEASE_PARTS <<< "${VERSION#*-}"
            for identifier in "${PRERELEASE_PARTS[@]}"; do
              if [[ "$identifier" =~ ^[0-9]+$ && "$identifier" != "0" && "$identifier" == 0* ]]; then
                echo "::error title=Invalid release tag::Numeric prerelease identifiers must not contain leading zeroes."
                exit 1
              fi
            done
          fi
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error title=Invalid expected commit::Expected a full lowercase Git commit SHA."
            exit 1
          fi

      - name: Checkout immutable release tag without credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: refs/tags/${{ github.event.client_payload.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag ancestry and package version
        id: validate
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
          EXPECTED_SHA: ${{ github.event.client_payload.expected_sha }}
          DEFAULT_BRANCH_NAME: ${{ github.event.repository.default_branch }}
        run: |
          git check-ref-format --branch "$DEFAULT_BRANCH_NAME" >/dev/null
          git fetch --no-tags origin "+refs/heads/$DEFAULT_BRANCH_NAME:refs/remotes/origin/$DEFAULT_BRANCH_NAME"
          TAG_COMMIT="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "::error title=Tag checkout mismatch::The requested tag did not resolve to the checked-out commit."
            exit 1
          fi
          if [ "$TAG_COMMIT" != "$EXPECTED_SHA" ]; then
            echo "::error title=Release commit mismatch::The dispatch request does not match the tag commit."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "refs/remotes/origin/$DEFAULT_BRANCH_NAME"; then
            echo "::error title=Untrusted release tag::The tag commit is not reachable from the protected default branch."
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error title=Release version mismatch::Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_sha=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-pipeline:
    name: Build Pipeline
    needs: validate-release-ref
    if: ${{ needs.validate-release-ref.result == 'success' }}
    permissions:
      contents: read
    uses: ./.github/workflows/_build-reusable.yml
    with:
      ref: ${{ needs.validate-release-ref.outputs.release_sha }}
      release_tag: ${{ needs.validate-release-ref.outputs.release_tag }}
      matrix: >-
        {"include":[
          {"platform":"macos-arm64","os":"macos-14","command":"node scripts/build-with-builder.js arm64 --mac --arm64","artifact-name":"macos-build-arm64","arch":"arm64"},
          {"platform":"macos-x64","os":"macos-14","command":"node scripts/build-with-builder.js x64 --mac --x64","artifact-name":"macos-build-x64","arch":"x64"},
          {"platform":"windows-x64","os":"windows-2022","command":"node scripts/build-with-builder.js x64 --win --x64","artifact-name":"windows-build-x64","arch":"x64"},
          {"platform":"windows-arm64","os":"windows-2022","command":"node scripts/build-with-builder.js arm64 --win --arm64","artifact-name":"windows-build-arm64","arch":"arm64"},
          {"platform":"linux-x64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js x64 --linux --x64","artifact-name":"linux-build-x64","arch":"x64"},
          {"platform":"linux-arm64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js arm64 --linux --arm64","artifact-name":"linux-build-arm64","arch":"arm64"}
        ]}
  release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [validate-release-ref, build-pipeline]
    if: ${{ needs.build-pipeline.result == 'success' }}
    environment: release
    permissions:
      contents: write
    outputs:
      release_sha: ${{ steps.release-metadata.outputs.release_sha }}
    steps:
      - name: Checkout trusted release tooling
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.validate-release-ref.outputs.release_sha }}
          persist-credentials: false

      - name: Record immutable release metadata
        id: release-metadata
        shell: bash
        run: echo "release_sha=${{ needs.validate-release-ref.outputs.release_sha }}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: build-artifacts

      - name: Prepare release assets
        shell: bash
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Create draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.validate-release-ref.outputs.release_tag }}
          name: ${{ needs.validate-release-ref.outputs.release_tag }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.AppImage
            release-assets/**/*.rpm
            release-assets/**/*.zip
            release-assets/**/*.yml
            release-assets/**/*.blockmap
          generate_release_notes: true
          draft: true
          prerelease: ${{ needs.validate-release-ref.outputs.prerelease == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}

  release-smoke-gate:
    name: Release Smoke Gate (macOS install)
    runs-on: macos-14
    needs: release
    if: ${{ needs.release.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Checkout trusted smoke tests
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release.outputs.release_sha }}
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install deps for the connect probe
        run: bun install --frozen-lockfile

      - name: macOS install gate
        run: bash scripts/release-smoke-macos.sh --tag "${{ github.event.client_payload.tag }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Provider-connect gate
        run: bun run scripts/release-smoke-connect.ts
        env:
          SMOKE_KEY_OPENAI: ${{ secrets.SMOKE_KEY_OPENAI }}
          SMOKE_KEY_ANTHROPIC: ${{ secrets.SMOKE_KEY_ANTHROPIC }}
          SMOKE_KEY_MINIMAX: ${{ secrets.SMOKE_KEY_MINIMAX }}
          SMOKE_KEY_MOONSHOT: ${{ secrets.SMOKE_KEY_MOONSHOT }}
          SMOKE_KEY_OLLAMA_CLOUD: ${{ secrets.SMOKE_KEY_OLLAMA_CLOUD }}

  release-smoke-gate-windows:
    name: Release Smoke Gate (Windows signature)
    runs-on: windows-2022
    needs: release
    if: ${{ needs.release.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Checkout trusted smoke tests
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release.outputs.release_sha }}
          persist-credentials: false

      - name: Windows install gate
        shell: pwsh
        run: pwsh scripts/release-smoke-windows.ps1 -Tag "${{ github.event.client_payload.tag }}"
        env:
          GH_TOKEN: ${{ github.token }}

  publish-release:
    name: Publish Release (both gates passed)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [release, release-smoke-gate, release-smoke-gate-windows]
    if: |
      always() &&
      needs.release.result == 'success' &&
      needs.release-smoke-gate.result == 'success' &&
      needs.release-smoke-gate-windows.result == 'success'
    permissions:
      actions: read
      contents: write
    steps:
      - name: Publish npm package and wait for success
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.client_payload.tag }}"
          RELEASE_SHA="${{ needs.release.outputs.release_sha }}"
          CORRELATION="${{ github.run_id }}-${{ github.run_attempt }}"
          RUN_TITLE="Publish getwayland $TAG [$CORRELATION]"
          BEFORE_RUN_IDS="$(
            gh run list \
              --repo "${{ github.repository }}" \
              --workflow publish-npm.yml \
              --event repository_dispatch \
              --limit 100 \
              --json databaseId \
              --jq 'map(.databaseId) | join(" ")'
          )"

          jq -n \
            --arg tag "$TAG" \
            --arg sha "$RELEASE_SHA" \
            --arg correlation "$CORRELATION" \
            '{
              event_type: "npm-publish",
              client_payload: {
                tag: $tag,
                expected_sha: $sha,
                promote: true,
                correlation: $correlation
              }
            }' |
            gh api --method POST "repos/${{ github.repository }}/dispatches" --input -

          NPM_RUN_ID=''
          for _ in $(seq 1 60); do
            while read -r candidate; do
              if [ -n "$candidate" ] && [[ " $BEFORE_RUN_IDS " != *" $candidate "* ]]; then
                NPM_RUN_ID="$candidate"
                break
              fi
            done < <(
              gh run list \
                --repo "${{ github.repository }}" \
                --workflow publish-npm.yml \
                --event repository_dispatch \
                --limit 100 \
                --json databaseId,displayTitle,headBranch \
                --jq ".[] | select(.displayTitle == \"$RUN_TITLE\" and .headBranch == \"main\") | .databaseId"
            )
            if [ -n "$NPM_RUN_ID" ]; then
              break
            fi
            sleep 5
          done
          if [ -z "$NPM_RUN_ID" ]; then
            echo "::error title=npm publication not found::No correlated publish-npm workflow run appeared."
            exit 1
          fi

          gh run watch "$NPM_RUN_ID" --repo "${{ github.repository }}" --exit-status

      - name: Expose the verified release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.client_payload.tag }}"
          if [[ "$TAG" == *-* ]]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --latest=false --prerelease
          else
            EXPECTED_VERSION="${TAG#v}"
            PROMOTED_VERSION="$(
              curl \
                --fail \
                --silent \
                --show-error \
                --retry 3 \
                --proto '=https' \
                --tlsv1.2 \
                'https://registry.npmjs.org/getwayland/latest' |
                jq -er '.version'
            )"
            if [ "$PROMOTED_VERSION" != "$EXPECTED_VERSION" ]; then
              echo "::error title=Promoted npm version mismatch::Expected getwayland@$EXPECTED_VERSION at latest, found $PROMOTED_VERSION."
              exit 1
            fi
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --latest --prerelease=false
          fi
