name: 'PR Checks (docs only)'

on:
  pull_request:
    types: [opened, synchronize, edited, ready_for_review]
    branches: [main, dev]
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.18.0'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install prek
        run: npm install -g @j178/prek@0.4.10

      - name: Run prek checks
        env:
          PR_BASE_REF: ${{ github.base_ref }}
        run: prek run --from-ref "origin/$PR_BASE_REF" --to-ref HEAD

  unit-tests-ubuntu:
    name: Unit Tests (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping unit tests."

  unit-tests-macos:
    name: Unit Tests (macos-14)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping unit tests."

  unit-tests-windows:
    name: Unit Tests (windows-2022)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping unit tests."
