name: Build Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      matrix:
        description: 'Build matrix as JSON string (passed via fromJSON in caller)'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout (leave empty to use the triggering commit)'
        type: string
        default: ''
      release_tag:
        description: 'Validated stable release tag; empty for non-release builds'
        type: string
        default: ''
      skip_code_quality:
        description: 'Skip code quality checks (faster builds for debugging)'
        type: boolean
        default: false
      append_commit_hash:
        description: 'Append short commit hash to artifact names'
        type: boolean
        default: false
      upload_installers_only:
        description: 'Only upload primary installers (exe/msi/dmg/deb), skip zip/yml/blockmap'
        type: boolean
        default: false

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'
  WAYLAND_HUB_TAG: 'dist-ebc6a2b'
  # The FerroxLabs/waylandHub repo/tag does not exist yet, so
  # prepareHubResources.js fails ("Failed to download index.json from all
  # mirrors") and aborts the build. Skip hub staging until that repo is
  # published; hub extensions are not required to ship a working release.
  WAYLAND_HUB_SKIP: '1'
  # Bundle the Wayland-Core engine into every release installer. The engine's
  # multi-platform release stream (FerroxLabs/wayland-core) now exists with all
  # six platform archives + verified shasums, so prepareWaylandCore.js downloads
  # and bundles the matching binary at build time (auth via the GH_TOKEN passed
  # to the build step). There is NO runtime download fallback, so the release
  # MUST bundle the engine here. PR/test builds (build-matrix.yml, pr-checks.yml)
  # keep WCORE_SKIP=1 to stay fast; only this release path ships the engine.
  WCORE_SKIP: '0'
  # Pinned Bun runtime bundled into the packaged app. Must match
  # PINNED_BUN_VERSION in scripts/prepareBundledBun.js and the
  # corresponding entry in scripts/bundled-bun-shasums.json.
  WAYLAND_BUN_VERSION: '1.3.14'

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_code_quality }}
    env:
      # tsc OOMs at Node's ~2GB default old-space on this codebase; pr-checks.yml
      # raises the same limit (its line 71) which is why PR-time tsc passes.
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.23.1'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      # NOTE: Formatting and the full test suite are already enforced per-PR by
      # pr-checks.yml - formatting diff-scoped via `prek`, and the entire vitest
      # suite SHARDED across 3 OS x 4 shards (it exceeds the 10-min single-runner
      # timeout unsharded, per that workflow's own comment). This reusable
      # workflow runs only on tag/manual release builds of already-merged code
      # that already passed those gates, so re-running a repo-wide `oxfmt --check`
      # (trips on generated data / fixtures / injected docs) and an unsharded
      # `vitest run` (times out) here is both redundant and broken - together they
      # were the reason no release ever built. lint + tsc remain as a fast
      # pre-build sanity gate; behavioural testing stays the PR matrix's job.

      - name: TypeScript type check
        run: bunx tsc --noEmit

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    # Environment secrets are resolved inside this called job. Release builds
    # wait for approval before the runner receives credentials; manual builds
    # use a separate unprotected environment with no secrets.
    environment:
      name: ${{ inputs.release_tag != '' && 'release' || 'build-unprotected' }}
      deployment: false
    # Defense in depth: without this, a hung step (e.g. codesign blocking on
    # Apple's timestamp server) rides GitHub's 6h default — three v0.9.7 runs
    # wedged 90-160 min before manual cancel. 120 sits clear of a slow-but-healthy
    # build (~50-60 min build + two ~20 min notary waits can stack) yet still cuts
    # a true wedge well before 6h so auto-retry kicks in.
    timeout-minutes: 120
    needs: code-quality
    if: ${{ always() && (inputs.skip_code_quality || needs.code-quality.result == 'success') }}

    outputs:
      commit-short: ${{ steps.commit.outputs.short }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Get commit hash
        id: commit
        shell: bash
        run: |
          SHORT=$(git rev-parse --short HEAD)
          echo "short=$SHORT" >> $GITHUB_OUTPUT
          echo "Commit: $SHORT"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.23.1'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12.10'

      # Restore Electron/Electron-Builder caches before any build-related install
      - name: Cache Electron artifacts
        id: electron-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ runner.temp }}/.cache/electron
            ${{ runner.temp }}/.cache/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-
            electron-cache-${{ matrix.platform }}-

      - name: Cache status
        run: echo "electron-cache-hit=${{ steps.electron-cache.outputs.cache-hit }}"

      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          WAYLAND_STRICT_PACKAGING: '1'
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: bun install --frozen-lockfile

      - name: Setup Windows native dependencies (for Windows only)
        if: startsWith(matrix.platform, 'windows')
        run: |
          bun install --global node-gyp@13.0.0

      - name: Install MSVC ARM64 toolchain (Windows ARM64 only)
        if: matrix.platform == 'windows-arm64'
        continue-on-error: true
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 60
          shell: pwsh
          command: |
            choco install visualstudio2022buildtools --yes --params "'--add Microsoft.VisualStudio.Component.VC.Tools.ARM64 --add Microsoft.VisualStudio.Component.Windows11SDK.22000 --includeRecommended --includeOptional'"

      - name: Setup Windows build environment (for Windows only)
        if: startsWith(matrix.platform, 'windows')
        run: |
          echo "Setting Windows SDK version for ConPty support"
          echo "WindowsTargetPlatformVersion=10.0.19041.0" >> $env:GITHUB_ENV

      - name: Setup MSBuild (for Windows only)
        if: startsWith(matrix.platform, 'windows')
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0
        with:
          vs-version: '17.0'

      - name: Rebuild native modules for Electron
        if: "!startsWith(matrix.platform, 'windows')"
        run: bunx electron-builder install-app-deps
        env:
          npm_config_runtime: electron
          npm_config_disturl: https://electronjs.org/headers
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder

      - name: Print build configuration
        shell: bash
        run: |
          echo "=========================================="
          echo "BUILD CONFIGURATION"
          echo "=========================================="
          echo "Platform: ${{ matrix.platform }}"
          echo "Target Architecture: ${{ matrix.arch }}"
          echo "Build Command: ${{ matrix.command }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "Ref: ${{ inputs.ref || '(default)' }}"
          echo "Commit: ${{ steps.commit.outputs.short }}"
          echo "=========================================="

      # macOS code signing certificate installation
      - name: Setup macOS code signing (macOS only)
        if: startsWith(matrix.platform, 'macos')
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temp-keychain-password' }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Installing code signing certificate..."

            # Create certificate file
            echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > certificate.p12

            # Create temporary keychain
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            # Disable the 300s default auto-lock. The dmg is code-signed in a
            # separate codesign call (notarizeDmg) several minutes AFTER the app
            # sign — past the 300s default, the keychain auto-locks and that
            # codesign hangs forever waiting for an unlock prompt that never
            # comes in CI. (Root cause of the v0.9.7 mac "codesign hang"; it was
            # never the Apple TSA.) 6h timeout outlasts any build.
            security set-keychain-settings -t 21600 build.keychain

            # Import certificate
            security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

            # Clean up certificate file
            rm certificate.p12

            echo "Certificate imported successfully"
          else
            echo "No certificate provided - building unsigned application"
            echo "To enable code signing, add BUILD_CERTIFICATE_BASE64 and P12_PASSWORD secrets"
          fi

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-pip pkg-config libsqlite3-dev fakeroot dpkg-dev rpm libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon-dev libxss1 libatspi2.0-dev libgtk-3-dev libxrandr2 libasound2-dev

      - name: Rebuild native modules for Electron (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        continue-on-error: false
        run: |
          $arch = "${{ matrix.arch }}"
          $electronVer = (node -p "require('./package.json').devDependencies.electron.replace(/[\^~]/g, '')").Trim()

          Write-Host "=========================================="
          Write-Host "Rebuilding native modules for Electron $electronVer ($arch)"
          Write-Host "=========================================="

          # Strategy: Try prebuild-install first (faster, more reliable)
          # Fallback to electron-rebuild only if prebuild-install fails
          $success = $false

          # Step 1: Try prebuild-install (downloads prebuilt binaries)
          Write-Host ""
          Write-Host "[Step 1] Trying prebuild-install..."
          $prebuildResult = $null
          try {
          $prebuildResult = bun x --yes prebuild-install --runtime=electron --target=$electronVer --platform=win32 --arch=$arch --force 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ prebuild-install succeeded"
              $success = $true
            } else {
              Write-Host "⚠️ prebuild-install exited with code $LASTEXITCODE"
            }
          } catch {
            Write-Host "⚠️ prebuild-install failed: $_"
          }

          # Step 2: Verify or fallback to electron-rebuild
          $sqliteNode = "node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (-not (Test-Path $sqliteNode)) {
            Write-Host ""
            Write-Host "[Step 2] prebuild-install didn't produce binary, trying electron-rebuild..."
            try {
              bunx electron-rebuild -f -w better-sqlite3
              if ($LASTEXITCODE -eq 0) {
                Write-Host "✅ electron-rebuild succeeded"
                $success = $true
              }
            } catch {
              Write-Host "❌ electron-rebuild failed: $_"
            }
          }

          # Final verification
          Write-Host ""
          Write-Host "Verifying native modules..."
          if (Test-Path $sqliteNode) {
            $size = [math]::Round((Get-Item $sqliteNode).Length / 1MB, 1)
            Write-Host "✅ better-sqlite3 found: $sqliteNode ($size MB)"
          } else {
            Write-Error "❌ better-sqlite3 native module not found at: $sqliteNode"
            exit 1
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "✅ All critical native modules verified"
          Write-Host "=========================================="
          exit 0
        env:
          npm_config_runtime: electron
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          npm_config_disturl: https://electronjs.org/headers
          # Don't force build_from_source - let prebuild-install try first
          MSVS_VERSION: 2022
          GYP_MSVS_VERSION: 2022

      # Mandatory-on-tag signing guard: a stable release tag build must never
      # ship an unsigned Windows artifact. Non-tag/dev builds remain eligible
      # for the local unsigned overrides in scripts/build-with-builder.js.
      - name: Require Azure signing credentials on release tag (Windows)
        if: startsWith(matrix.platform, 'windows') && inputs.release_tag != ''
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -z "${AZURE_TENANT_ID//[[:space:]]/}" ] || [ -z "${AZURE_CLIENT_ID//[[:space:]]/}" ] || [ -z "${AZURE_CLIENT_SECRET//[[:space:]]/}" ]; then
            echo "::error title=Missing Windows signing credentials::AZURE_TENANT_ID, AZURE_CLIENT_ID, and AZURE_CLIENT_SECRET are required for release tags."
            exit 1
          fi
          echo "Azure Trusted Signing credentials present — proceeding with signed Windows build."

      # Fetch and validate signing code before any Azure credential is exposed.
      # app-builder-lib is patched to revalidate these exact paths and hashes
      # with Azure variables removed before every signing subprocess import.
      - name: Install pinned Azure TrustedSigning module (Windows release)
        if: startsWith(matrix.platform, 'windows') && inputs.release_tag != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $moduleVersion = '0.5.8'
          $expectedPackageHash = 'h3QX13+As/6i8v7rSUhgDWg033GklH5JiVLGFV0Rl3CipfT6/0XQPqEhI2uOogGTFkxiqXOTCeQc4zTSt2v6KQ=='
          $packageUri = "https://www.powershellgallery.com/api/v2/package/TrustedSigning/$moduleVersion"
          $packagePath = Join-Path $env:RUNNER_TEMP "TrustedSigning.$moduleVersion.nupkg"
          $moduleRoot = Join-Path $env:RUNNER_TEMP "trusted-signing\$moduleVersion"
          $moduleFiles = @(
            'TrustedSigning.nuspec',
            'NugetInstall\NugetInstall.psd1',
            'NugetInstall\NugetInstall.psm1',
            'SignCli\SignCli.psd1',
            'SignCli\SignCli.psm1',
            'SignTool\SignTool.psd1',
            'SignTool\SignTool.psm1',
            'about_TrustedSigning.help.txt',
            'catalog.cat',
            'TrustedSigning-help.xml',
            'TrustedSigning.psd1',
            'TrustedSigning.psm1',
            'FileFormat\FileFormat.psd1',
            'FileFormat\FileFormat.psm1',
            'Metadata\Metadata.psd1',
            'Metadata\Metadata.psm1'
          )

          Invoke-WebRequest -UseBasicParsing -Uri $packageUri -OutFile $packagePath
          $actualPackageHash = [Convert]::ToBase64String(
            [Security.Cryptography.SHA512]::HashData(
              [IO.File]::ReadAllBytes($packagePath)
            )
          )
          if (-not [string]::Equals($actualPackageHash, $expectedPackageHash, [StringComparison]::Ordinal)) {
            throw "TrustedSigning $moduleVersion package SHA-512 mismatch."
          }

          New-Item -ItemType Directory -Path $moduleRoot -Force | Out-Null
          $archive = [IO.Compression.ZipFile]::OpenRead($packagePath)
          try {
            foreach ($relativePath in $moduleFiles) {
              $entryPath = $relativePath.Replace('\', '/')
              $entry = $archive.GetEntry($entryPath)
              if ($null -eq $entry) {
                throw "TrustedSigning package is missing cataloged file: $relativePath"
              }

              $destination = Join-Path $moduleRoot $relativePath
              $destinationDirectory = Split-Path -Parent $destination
              New-Item -ItemType Directory -Path $destinationDirectory -Force | Out-Null
              [IO.Compression.ZipFileExtensions]::ExtractToFile($entry, $destination, $true)
            }
          } finally {
            $archive.Dispose()
          }

          $catalogPath = Join-Path $moduleRoot 'catalog.cat'
          $catalog = Test-FileCatalog -Path $moduleRoot -CatalogFilePath $catalogPath -Detailed
          if ($catalog.Status -ne 'Valid' -or $catalog.Signature.Status -ne 'Valid') {
            throw "TrustedSigning $moduleVersion failed signed catalog verification."
          }

          $manifestPath = Join-Path $moduleRoot 'TrustedSigning.psd1'
          $manifest = Test-ModuleManifest -Path $manifestPath -ErrorAction Stop
          if ($manifest.Version -ne [version]$moduleVersion) {
            throw "TrustedSigning manifest version mismatch: $($manifest.Version)"
          }

          Import-Module -Name $manifestPath -Force -ErrorAction Stop
          $dependencyManifest = Join-Path $moduleRoot 'NugetInstall\NugetInstall.psd1'
          Import-Module -Name $dependencyManifest -Force -ErrorAction Stop
          $dependencies = Get-EveryDependency
          if (-not (Get-Command Invoke-TrustedSigning -ErrorAction SilentlyContinue)) {
            throw 'Invoke-TrustedSigning is unavailable after importing the pinned module.'
          }

          $dependencyRecords = foreach ($dependencyRoot in @(
            $dependencies.DlibFolderPath,
            $dependencies.SignToolFolderPath,
            $dependencies.SignCliFolderPath
          )) {
            if (-not (Test-Path -LiteralPath $dependencyRoot -PathType Container)) {
              throw "TrustedSigning dependency directory is missing: $dependencyRoot"
            }

            Get-ChildItem -LiteralPath $dependencyRoot -File -Recurse |
              Sort-Object -Property FullName |
              ForEach-Object {
                [ordered]@{
                  Path = $_.FullName
                  Sha256 = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash
                }
              }
          }
          if (@($dependencyRecords).Count -eq 0) {
            throw 'TrustedSigning dependency hash manifest would be empty.'
          }

          $dependencyHashManifest = Join-Path $env:RUNNER_TEMP 'trusted-signing-dependencies.json'
          @($dependencyRecords) |
            ConvertTo-Json -Depth 3 |
            Set-Content -LiteralPath $dependencyHashManifest -Encoding utf8 -NoNewline

          "WAYLAND_TRUSTED_SIGNING_MODULE_PATH=$manifestPath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WAYLAND_TRUSTED_SIGNING_DEPENDENCY_MANIFEST=$dependencyHashManifest" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "TrustedSigning v$moduleVersion and its dependencies are pinned and verified."

      - name: Build with electron-builder (Windows)
        if: startsWith(matrix.platform, 'windows')
        id: windows-build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Command = $env:WINDOWS_BUILD_COMMAND
          Write-Host "Running Windows build command: $Command"
          Invoke-Expression $Command
          $BuildExitCode = $LASTEXITCODE
          if ($BuildExitCode -ne 0) {
            Write-Error "${{ matrix.platform }} build failed with exit code $BuildExitCode."
            exit $BuildExitCode
          }
          "result=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Windows build completed successfully"
        env:
          WINDOWS_BUILD_COMMAND: ${{ matrix.command }}
          WAYLAND_RELEASE_TAG: ${{ inputs.release_tag }}
          # Node.js memory limit for vite bundling (prevents OOM during build)
          # Node.js 内存限制，防止 vite 打包时内存不足
          NODE_OPTIONS: '--max-old-space-size=8192'
          # Target arch / 目标架构
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          # Native module compilation / 原生模块编译
          npm_config_runtime: electron
          npm_config_disturl: https://electronjs.org/headers
          npm_config_build_from_source: true
          npm_config_cache: ${{ runner.temp }}/.npm
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder
          # Signing & IDs / 签名与应用 ID 配置
          APP_ID: ${{ secrets.APP_ID }}
          appleId: ${{ secrets.APPLE_ID }}
          appleIdPassword: ${{ secrets.APPLE_ID_PASSWORD }}
          teamId: ${{ secrets.TEAM_ID }}
          identity: ${{ secrets.IDENTITY }}
          CSC_NAME: ${{ secrets.IDENTITY }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Windows build flags / Windows 构建参数
          MSVS_VERSION: 2022
          GYP_MSVS_VERSION: 2022
          WindowsTargetPlatformVersion: 10.0.19041.0
          _WIN32_WINNT: 0x0A00
          # Sentry DSN (injected at build time via vite define)
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Azure Trusted Signing credentials (Windows Authenticode). electron-builder
          # authenticates Trusted Signing via the Azure EnvironmentCredential, which
          # reads exactly these three vars. Non-secret signing config lives in
          # electron-builder.yml under win.azureSignOptions.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # CI flag & GitHub token / CI 标识与 GitHub Token
          CI: true
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Clean up any stale disk images before DMG creation (macOS only)
      # 清理可能残留的磁盘镜像，避免 hdiutil "Device not configured" 错误
      - name: Clean up stale disk images (macOS only)
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "Cleaning up any stale disk images..."
          # Detach any mounted disk images
          hdiutil info 2>/dev/null | grep '/dev/disk' | awk '{print $1}' | while read disk; do
            echo "Detaching $disk..."
            hdiutil detach "$disk" -force 2>/dev/null || true
          done
          # Clean up any temporary DMG files
          rm -f /tmp/*.dmg 2>/dev/null || true
          echo "Cleanup complete"

      # macOS: Build with notarization - DMG failure = CI failure, notarization failure = warning only
      # macOS: 构建并公证 - DMG 失败 = CI 失败，公证失败 = 仅警告
      - name: Build with electron-builder (macOS)
        if: startsWith(matrix.platform, 'macos')
        id: macos-build
        shell: bash
        run: |
          set +e  # Handle errors manually

          # Run build command
          ${{ matrix.command }} 2>&1 | tee "${RUNNER_TEMP}/build.log"
          BUILD_EXIT_CODE=${PIPESTATUS[0]}

          # Check if DMG was created (most important artifact)
          DMG_EXISTS=false
          if ls out/*.dmg 1>/dev/null 2>&1; then
            DMG_EXISTS=true
            echo "✅ DMG created successfully"
          fi

          # If build succeeded completely
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ Build completed successfully"
            echo "notarization_status=success" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build failed - check if it's just notarization failure
          if [ "$DMG_EXISTS" = true ]; then
            # DMG exists but build failed - likely notarization issue
            if grep -qiE "notariz|staple" "${RUNNER_TEMP}/build.log"; then
              echo "⚠️ DMG created but notarization failed"
              echo "notarization_status=failed" >> $GITHUB_OUTPUT
              echo "::warning title=Notarization Failed::DMG was built and signed successfully, but **notarization failed**."
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "## ⚠️ Notarization Warning" >> $GITHUB_STEP_SUMMARY
              echo "DMG was built and signed successfully, but **notarization failed**." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Users may see Gatekeeper warnings when opening the app for the first time." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "To fix: Right-click the app → Open → Open" >> $GITHUB_STEP_SUMMARY
              exit 0  # Allow CI to continue
            fi
          fi

          # DMG doesn't exist or other fatal error - fail CI
          echo "❌ Build failed - DMG was not created"
          echo "notarization_status=build_failed" >> $GITHUB_OUTPUT
          exit 1
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          npm_config_arch: ${{ matrix.arch }}
          APP_ID: ${{ secrets.APP_ID }}
          appleId: ${{ secrets.APPLE_ID }}
          appleIdPassword: ${{ secrets.APPLE_ID_PASSWORD }}
          teamId: ${{ secrets.TEAM_ID }}
          identity: ${{ secrets.IDENTITY }}
          CSC_NAME: ${{ secrets.IDENTITY }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          npm_config_cache: ${{ runner.temp }}/.npm
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          npm_config_electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          ELECTRON_MIRROR: ''
          npm_config_disturl: https://electronjs.org/headers
          npm_config_runtime: electron
          npm_config_target_arch: ${{ matrix.arch }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          CI: true
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Post-build: repair the macOS update feed. electron-builder computes the
      # dmg's sha512/size at artifact-created time — BEFORE notarizeDmg staples
      # it — and flushes latest-mac.yml only in its final publish-task phase
      # (after the afterAllArtifactBuild hook returns), so the on-disk manifest
      # carries the stale pre-staple dmg hash and in-app updates fail integrity
      # verification (#109). The yml is on disk now and the dmg is stapled, so
      # recompute the real digests here. Idempotent: a notarization-skipped
      # (un-stapled) build leaves the manifest byte-for-byte unchanged. The
      # release smoke gate (verify-update-metadata.mjs) then confirms it.
      - name: Repair macOS update manifest (post-notarize)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: node scripts/repair-mac-manifest.mjs --dir out

      # Linux: Standard build without special error handling
      # Linux: 标准构建，无特殊错误处理
      - name: Build with electron-builder (Linux)
        if: startsWith(matrix.platform, 'linux')
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 60
          max_attempts: 2
          retry_wait_seconds: 60
          command: ${{ matrix.command }}
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          npm_config_arch: ${{ matrix.arch }}
          npm_config_cache: ${{ runner.temp }}/.npm
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          npm_config_electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          ELECTRON_MIRROR: ''
          npm_config_disturl: https://electronjs.org/headers
          npm_config_runtime: electron
          npm_config_target_arch: ${{ matrix.arch }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          CI: true
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Verify packaged bundled bun assets
        if: >-
          !startsWith(matrix.platform, 'windows') ||
          steps.windows-build.outputs.result == 'success'
        run: bun run test:packaged:bun

      # macOS 钥匙串清理
      - name: Clean up keychain (macOS only)
        if: startsWith(matrix.platform, 'macos') && always()
        run: |
          if security list-keychains | grep -q build.keychain; then
            security delete-keychain build.keychain
            echo "Temporary keychain deleted"
          fi

      # macOS 构建失败通知
      # macOS build failure notification
      - name: Notify on macOS build failure
        if: startsWith(matrix.platform, 'macos') && failure()
        run: |
          echo "::error title=macOS Build Failed::Build failed. Check the logs for details."
          echo ""
          echo "❌ macOS Build Failed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Common causes:"
          echo "  • hdiutil/DMG creation failure (Device not configured)"
          echo "  • Code signing issues"
          echo "  • Notarization timeout"
          echo "  • Out of memory (OOM)"
          echo ""
          echo "Check the build logs above for the specific error."
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: List build artifacts
        if: success() || failure()
        shell: bash
        run: |
          echo "=========================================="
          echo "BUILD ARTIFACTS"
          echo "=========================================="
          if [ -d "out" ]; then
            ls -lh out/ || true
            echo "=========================================="
            echo "Total artifacts:"
            find out/ -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.zip" -o -name "*.yml" \) -exec basename {} \; || true
          else
            echo "No out directory found!"
          fi

      # Upload artifacts when:
      # - Build succeeded (all platforms)
      # - macOS: notarization timeout but artifacts exist (handled in build step)
      # - Windows: only if windows-build step succeeded
      # 上传产物条件：
      # - 构建成功（所有平台）
      # - macOS: 公证超时但有产物（已在构建步骤中处理）
      # - Windows: 仅当 windows-build 步骤成功
      - name: Clean up non-installer artifacts
        if: >-
          inputs.upload_installers_only && success() &&
          (!startsWith(matrix.platform, 'windows') || steps.windows-build.outputs.result == 'success')
        shell: bash
        run: |
          echo "Removing non-installer files from out/ ..."
          rm -f out/*.blockmap out/*.zip out/*.yml out/builder-debug.yml 2>/dev/null || true
          echo "Remaining artifacts:"
          ls -lh out/ || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: >-
          success() &&
          (!startsWith(matrix.platform, 'windows') || steps.windows-build.outputs.result == 'success')
        with:
          name: ${{ inputs.append_commit_hash && format('{0}-{1}', matrix.artifact-name, steps.commit.outputs.short) || matrix.artifact-name }}
          path: |
            out/*.exe
            out/*.msi
            out/*.dmg
            out/*.deb
            out/*.AppImage
            out/*.rpm
            out/Wayland-*-win32-*.zip
            out/Wayland-*-mac-*.zip
            out/*.yml
            out/*.blockmap
          if-no-files-found: error
          retention-days: 7

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [code-quality, build]
    if: always()

    steps:
      - name: Write build summary
        env:
          MATRIX: ${{ inputs.matrix }}
        run: |
          PLATFORMS=$(echo "$MATRIX" | jq -r '[.include[].platform] | join(", ")')

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ inputs.ref || '(default)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.build.outputs.commit-short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | $PLATFORMS |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
