name: '✓PR E2E Artifacts'

on:
  workflow_dispatch:

concurrency:
  group: pr-e2e-artifacts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  e2e-artifacts:
    name: E2E Artifacts (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.18.0'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Setup just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2.0.0
        with:
          just-version: '1.51.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Linux display dependencies (E2E)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev xvfb

      - name: Run E2E tests (with screenshots)
        run: xvfb-run --auto-servernum just e2e-test
        env:
          CI: true
          E2E_DEV: '1'
          E2E_SCREENSHOTS: '1'
          WAYLAND_EXTENSIONS_PATH: ${{ github.workspace }}/examples

      - name: Upload E2E report (self-contained with screenshots & traces)
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-report-linux-pr
          path: |
            tests/e2e/report/
            tests/e2e/results/
            tests/e2e/screenshots/
          retention-days: 14
          if-no-files-found: error
