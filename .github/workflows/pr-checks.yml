name: 'PR Checks'

# Consolidated PR-gate workflow for the Wayland fork.
#
# This file is the union of the legacy upstream `pr-checks.yml` and the
# Wayland-fork `pr-gate.yml` (commit dc59d43e3). The two duplicated
# tsc/lint/vitest/build steps across separate runners; they are now one
# workflow.
#
# Job names ("Code Quality", "Unit Tests (<os>)", "Coverage Test",
# "I18n Check", "Security Audit E2E", "Release Script Test") are
# referenced by branch protection required-checks and by
# `pr-checks-docs.yml` (the docs-only stub that mirrors required-check
# names so docs-only PRs can satisfy the same set). DO NOT rename
# without updating both branch-protection settings and pr-checks-docs.yml.
#
# Cross-platform PACKAGED builds (electron-builder, ~45min per platform)
# were removed from PRs -- they now live in `build-matrix.yml`, gated on
# the repo variable `CI_BUILD_MATRIX_ENABLED`. PRs still run a fast
# unpackaged `electron-vite build` to catch compile errors.
#
# No repository secrets, write permissions, or OIDC permissions are available
# to this workflow. Maintainers use GitHub's built-in Re-run jobs UI.

run-name: >-
  PR #${{ github.event.pull_request.number }} | head=${{ github.event.pull_request.head.sha }}
  | base=${{ github.event.pull_request.base.repo.full_name }}:${{ github.event.pull_request.base.ref }}@${{ github.event.pull_request.base.sha }}

on:
  pull_request:
    types: [opened, synchronize, edited, closed, ready_for_review, reopened]
    branches: [main, dev, 'feat/**', 'release/**', 'integration/**']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'design-mockups/**'
      - '.planning/**'
      - '.blackboard/**'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'
  # Wayland-core release stream does not exist yet (see commit 48d155826).
  WCORE_SKIP: '1'
  CI: 'true'
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  # Cancel in-progress runs when PR is closed (merged or manually closed)
  cancel-if-closed:
    name: Cancel if PR closed
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR closed, cancelling in-progress runs via concurrency."

  # Resolve the immutable merge commit for normal pull_request runs. This job
  # never receives elevated permissions and executes no checked-out PR code.
  resolve-pr-context:
    name: Resolve immutable PR context
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
    steps:
      - name: Resolve immutable PR context
        id: resolve
        shell: bash
        env:
          EVENT_SHA: ${{ github.sha }}
          EVENT_BASE_REF: ${{ github.base_ref }}
          EVENT_BASE_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          CHECKOUT_REF="$EVENT_SHA"
          BASE_REF="$EVENT_BASE_REF"
          BASE_REPOSITORY="$EVENT_BASE_REPOSITORY"

          if [ "$BASE_REPOSITORY" != "$REPOSITORY" ]; then
            echo "Refusing PR whose base repository is not $REPOSITORY." >&2
            exit 1
          fi
          if [[ ! "$CHECKOUT_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Resolved checkout ref is not an immutable 40-character SHA." >&2
            exit 1
          fi
          if ! git check-ref-format --branch "$BASE_REF" >/dev/null; then
            echo "Resolved base ref is not a valid branch name." >&2
            exit 1
          fi

          printf 'checkout_ref=%s\n' "$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          printf 'base_ref=%s\n' "$BASE_REF" >> "$GITHUB_OUTPUT"

  # Job 1: Code quality checks (TypeScript, Oxlint, Oxfmt via prek)
  code-quality:
    name: Code Quality
    needs: resolve-pr-context
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install checksum-pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_NAME='gitleaks_8.30.1_linux_x64.tar.gz'
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"
          GITLEAKS_PATH="$RUNNER_TEMP/gitleaks"
          curl --fail-with-body --location --proto '=https' --tlsv1.2 \
            --connect-timeout 15 --max-time 120 \
            --output "$ARCHIVE_PATH" \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/$ARCHIVE_NAME"
          printf '%s  %s\n' \
            '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb' \
            "$ARCHIVE_PATH" | sha256sum --check --strict
          tar -xzf "$ARCHIVE_PATH" -C "$RUNNER_TEMP" gitleaks
          chmod 0755 "$GITLEAKS_PATH"
          "$GITLEAKS_PATH" version

      # Use the trusted base revision's rules so a PR cannot allowlist its own leak.
      - name: Scan PR commit delta for secrets
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ needs.resolve-pr-context.outputs.checkout_ref }}
        run: |
          set -euo pipefail
          if [[ ! "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]] || [[ ! "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'Secret-scan revisions must be immutable 40-character Git SHAs.' >&2
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$HEAD_SHA" ]; then
            echo 'Checked-out revision does not match the immutable PR revision.' >&2
            exit 1
          fi
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"
          CONFIG_PATH="$RUNNER_TEMP/gitleaks-base.toml"
          git show "$BASE_SHA:.gitleaks.toml" > "$CONFIG_PATH"
          test -s "$CONFIG_PATH"
          "$RUNNER_TEMP/gitleaks" git . \
            --config "$CONFIG_PATH" \
            --log-opts="$BASE_SHA..$HEAD_SHA" \
            --redact=100 \
            --no-banner

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.18.0'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install prek
        run: npm install -g @j178/prek@0.4.10

      - name: Run prek checks
        env:
          PR_BASE_REF: ${{ needs.resolve-pr-context.outputs.base_ref }}
        run: prek run --from-ref "origin/$PR_BASE_REF" --to-ref HEAD

  # Job 2: Unit tests across all platforms.
  # NOTE: job name "Unit Tests (<os>)" is a required check; pr-checks-docs.yml
  # mirrors these for docs-only PRs. Do not rename or collapse.
  # Sharded worker jobs: the full vitest suite exceeds the 10-min job timeout on
  # a single runner (native better-sqlite3 + timer-based channel-plugin tests),
  # so split it across 4 file-shards per OS that each finish well under the cap.
  # The required check names "Unit Tests (<os>)" are preserved by the aggregator
  # jobs below (so branch protection + pr-checks-docs.yml need no changes).
  unit-tests:
    name: Unit Tests Shard (${{ matrix.os }} ${{ matrix.shard }}/4)
    needs: resolve-pr-context
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    # #358: shard 1/4 was ~19m on ubuntu (vs the ~3.5m average) from real-timer
    # error-path tests + the skillRecall BM25 full-corpus gate. Those are now
    # fixed — the BM25 gate is gated out of PR shards behind RUN_RELEASE_GATES
    # (runs in release-gates.yml), and the iMessage delivery-poll / ConnectionTester
    # retry / killChild escalation tests no longer wait real seconds. Post-fix CI
    # on this PR: ubuntu/macos shards ~2min, windows shards 7.6-9.3min (windows
    # runners are just slow; tracked separately). The 35m stopgap drops to 15m —
    # ~1.6x over the slowest (windows, 9.3min). If windows variance trips the cap,
    # raise toward 18-20m.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-2022]
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.18.0'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Disable Windows Defender (Windows only)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests (vitest shard)
        run: bunx vitest run --shard=${{ matrix.shard }}/4

  # Aggregator jobs preserve the required-check names "Unit Tests (<os>)".
  # Each waits on the full sharded matrix and fails if any shard (on any OS)
  # failed, so a single failing unit test anywhere blocks the merge. GitHub's
  # `needs.<job>.result` for a matrix job is success only when every cell
  # succeeded.
  #
  # The `always()` guard is LOAD-BEARING — do NOT "fix" it to `!cancelled()`.
  # It is tempting, because on a run cancelled by the concurrency group above
  # `needs.unit-tests.result` is "cancelled", which trips the != "success" check
  # and stamps a red required check from a dead run (three of them, so it reads as
  # "unit tests failing on all three platforms" when nothing is broken at all).
  # But `!cancelled()` would SKIP these jobs on a cancelled run, and GitHub counts
  # a skipped required check as a PASS. Since the live run publishes no
  # "Unit Tests (<os>)" check until all 12 shards finish (~10-20 min), the PR would
  # go CLEAN — and auto-merge would fire — while the real tests were still running.
  # That trades a cosmetic false-red for a fail-open merge gate. Never do it.
  #
  # So the red stays (it is fail-closed and correct), and the step below instead
  # makes the superseded case unmistakable in the log + job summary. The stale red
  # is transient: the newest run stamps these same check names and supersedes it.
  #
  # KNOWN LIMITATION (follow-up): each aggregator gates on the WHOLE 12-cell matrix,
  # so one macOS-only shard failure also reds out "Unit Tests (ubuntu-latest)" and
  # "Unit Tests (windows-2022)". Per-OS gating needs the matrix restructured.
  unit-tests-ubuntu:
    name: Unit Tests (ubuntu-latest)
    if: always() && github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Verify all unit-test shards passed
        env:
          SHARDS_RESULT: ${{ needs.unit-tests.result }}
        run: |
          if [ "$SHARDS_RESULT" = "success" ]; then
            echo "All unit-test shards passed."
            exit 0
          fi

          if [ "$SHARDS_RESULT" = "cancelled" ]; then
            echo "::warning::SUPERSEDED RUN - NOT A REAL TEST FAILURE. The shards were cancelled because a newer run replaced this one for the same PR. The newest run is authoritative."
            {
              echo "### Superseded run - NOT a real test failure"
              echo ""
              echo 'The unit-test shards were `cancelled`: a newer run replaced this one for the'
              echo 'same PR (the `pr-checks-<pr>` concurrency group is `cancel-in-progress`).'
              echo ""
              echo 'This job still fails **on purpose** - a required check must never report green'
              echo 'when the tests it gates did not actually run. The red is correct but STALE: the'
              echo 'newest run stamps its own verdict on these same check names and supersedes it.'
              echo ""
              echo '**Do not go bug-hunting.** Open the newest `PR Checks` run for this commit.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "One or more unit-test shards did not pass (result: $SHARDS_RESULT)."
          exit 1

  unit-tests-macos:
    name: Unit Tests (macos-14)
    if: always() && github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Verify all unit-test shards passed
        env:
          SHARDS_RESULT: ${{ needs.unit-tests.result }}
        run: |
          if [ "$SHARDS_RESULT" = "success" ]; then
            echo "All unit-test shards passed."
            exit 0
          fi

          if [ "$SHARDS_RESULT" = "cancelled" ]; then
            echo "::warning::SUPERSEDED RUN - NOT A REAL TEST FAILURE. The shards were cancelled because a newer run replaced this one for the same PR. The newest run is authoritative."
            {
              echo "### Superseded run - NOT a real test failure"
              echo ""
              echo 'The unit-test shards were `cancelled`: a newer run replaced this one for the'
              echo 'same PR (the `pr-checks-<pr>` concurrency group is `cancel-in-progress`).'
              echo ""
              echo 'This job still fails **on purpose** - a required check must never report green'
              echo 'when the tests it gates did not actually run. The red is correct but STALE: the'
              echo 'newest run stamps its own verdict on these same check names and supersedes it.'
              echo ""
              echo '**Do not go bug-hunting.** Open the newest `PR Checks` run for this commit.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "One or more unit-test shards did not pass (result: $SHARDS_RESULT)."
          exit 1

  unit-tests-windows:
    name: Unit Tests (windows-2022)
    if: always() && github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Verify all unit-test shards passed
        env:
          SHARDS_RESULT: ${{ needs.unit-tests.result }}
        run: |
          if [ "$SHARDS_RESULT" = "success" ]; then
            echo "All unit-test shards passed."
            exit 0
          fi

          if [ "$SHARDS_RESULT" = "cancelled" ]; then
            echo "::warning::SUPERSEDED RUN - NOT A REAL TEST FAILURE. The shards were cancelled because a newer run replaced this one for the same PR. The newest run is authoritative."
            {
              echo "### Superseded run - NOT a real test failure"
              echo ""
              echo 'The unit-test shards were `cancelled`: a newer run replaced this one for the'
              echo 'same PR (the `pr-checks-<pr>` concurrency group is `cancel-in-progress`).'
              echo ""
              echo 'This job still fails **on purpose** - a required check must never report green'
              echo 'when the tests it gates did not actually run. The red is correct but STALE: the'
              echo 'newest run stamps its own verdict on these same check names and supersedes it.'
              echo ""
              echo '**Do not go bug-hunting.** Open the newest `PR Checks` run for this commit.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "One or more unit-test shards did not pass (result: $SHARDS_RESULT)."
          exit 1

  # Job 3: Coverage test (Linux only). The PR workflow uploads only an artifact;
  # credentialed reporting belongs in an isolated trusted workflow.
  coverage-tests:
    name: Coverage Test
    needs: resolve-pr-context
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    # The coverage run executes the whole suite WITH instrumentation, so it needs
    # more than the 10-min unit-test cap. Test or instrumentation failures block
    # this job so a partial report cannot be mistaken for valid coverage.
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.18.0'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run coverage tests
        id: coverage
        run: bun run test:coverage

      - name: Coverage result summary
        if: always()
        shell: bash
        env:
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
        run: |
          if [ "$COVERAGE_OUTCOME" = "failure" ]; then
            echo "::error::Coverage tests failed. Check logs for failed test details."
            echo "## Coverage check failed" >> $GITHUB_STEP_SUMMARY
            echo "Coverage command failed in this run. Please review test failures in logs." >> $GITHUB_STEP_SUMMARY
            if [ -f coverage/lcov.info ]; then
              echo "lcov.info exists and will be uploaded as a workflow artifact." >> $GITHUB_STEP_SUMMARY
            else
              echo "lcov.info not found; no coverage artifact will be uploaded." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## Coverage check" >> $GITHUB_STEP_SUMMARY
            echo "Coverage command passed." >> $GITHUB_STEP_SUMMARY
            if [ -f coverage/lcov.info ]; then
              echo "Prepared Linux (ubuntu-latest) coverage for artifact upload." >> $GITHUB_STEP_SUMMARY
            else
              echo "Coverage passed but lcov.info is missing; artifact upload was skipped." >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload coverage artifacts
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  # Job 4: I18n validation. Existing translation debt remains warning-only;
  # omissions and empty values introduced by this PR fail the job.
  i18n-check:
    name: I18n Check
    needs: resolve-pr-context
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.18.0'

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run i18n validation
        id: i18n
        shell: bash
        env:
          I18N_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -o pipefail
          node scripts/check-i18n.js 2>&1 | tee i18n-check.log

      - name: Publish i18n summary
        if: always()
        shell: bash
        run: |
          echo "## i18n validation" >> $GITHUB_STEP_SUMMARY
          if grep -q "warning" i18n-check.log; then
            echo "Missing/incomplete translations found. Please review warnings below." >> $GITHUB_STEP_SUMMARY
          else
            echo "No i18n warnings detected." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>i18n log</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat i18n-check.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  # Job 5: Fast unpackaged build + security-audit e2e spec.
  # Merged from pr-gate.yml (commit dc59d43e3). The HEAVY cross-platform
  # electron-builder packaging step that used to live in pr-checks.yml
  # was removed -- it now lives in build-matrix.yml (push/cron + flag).
  security-audit:
    name: Security Audit E2E
    needs: resolve-pr-context
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24.18.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Cache Bun + node_modules
        if: github.event_name == 'pull_request'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: pr-checks-bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            pr-checks-bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Build (electron-vite, no packaging)
        run: bunx electron-vite build

      # The e2e spec launches the real Electron binary via _electron.launch().
      # The restored node_modules cache has electron without a usable binary
      # (path.txt missing / dist incomplete), and bun's --frozen-lockfile install
      # doesn't re-run electron's download script for the already-present package.
      # Remedy: explicitly run electron's (trusted) install.js, asserting a
      # COMPLETE dist (path.txt + the executable it names) so a bad install fails
      # HERE (with `set -x` diagnostics) instead of mid-spec.
      #
      # #361: since ~2026-06-26 an environmental egress cap on this runner
      # truncates the ~100MB binary zip to ~678KB (a lone v8_context_snapshot.bin)
      # on EVERY external host, so no download path can recover it. The durable
      # fix is to cache the extracted binary in GitHub infra (restore is NOT
      # subject to the external egress cap) and make the install idempotent so a
      # cache-warm binary is reused instead of nuked + re-downloaded every run.
      - name: Restore Electron binary cache
        if: github.event_name == 'pull_request'
        id: electron-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules/electron/dist
            node_modules/electron/path.txt
          # Keyed on the resolved electron version (node_modules/electron exists
          # post-install); a version bump invalidates the entry.
          key: electron-bin-${{ runner.os }}-${{ hashFiles('node_modules/electron/package.json') }}

      - name: Ensure Electron binary is installed
        # ROOT CAUSE (#361): "Ensure Electron binary is installed" has failed
        # deterministically since ~2026-06-26 — dist/ ends up with only
        # v8_context_snapshot.bin and no path.txt, identically whether
        # ELECTRON_MIRROR points at npmmirror or the default github host. So it
        # is NOT a host-specific egress cap (that hypothesis was tested and
        # disproven on this PR). @electron/get's own failure is swallowed by a
        # console.error()+process.exit() flush race, hiding whether the cause is
        # a network truncation or extraction (disk).
        #
        # This step bypasses @electron/get: download the zip with curl (a client
        # not subject to whatever truncates @electron/get) with retries, then
        # HARD-ASSERT size + sha256 against electron's bundled checksums.json so a
        # truncated download fails loudly with the real byte count instead of
        # silently. Unzip into dist/ ourselves, with df before/after to surface
        # any ENOSPC. npmmirror first, default github as fallback. A complete
        # install here also finally lets the actions/cache Save warm for reuse.
        env:
          npm_config_disturl: 'https://electronjs.org/headers'
        run: |
          set -x
          df -h /
          electron_ok() {
            [ -s node_modules/electron/path.txt ] \
              && [ -x "node_modules/electron/dist/$(cat node_modules/electron/path.txt)" ]
          }
          if electron_ok; then
            echo "electron already present (cache-warm); skipping download"
            exit 0
          fi
          VER="$(node -p "require('./node_modules/electron/package.json').version")"
          ZIP="electron-v${VER}-linux-x64.zip"
          EXPECT="$(node -e "process.stdout.write((require('./node_modules/electron/checksums.json')['${ZIP}']||'').toLowerCase())")"
          echo "electron ${VER}; expected sha256=${EXPECT:-<none>}"
          for base in \
            "https://npmmirror.com/mirrors/electron/v${VER}" \
            "https://github.com/electron/electron/releases/download/v${VER}"; do
            url="${base}/${ZIP}"
            echo "::group::download ${url}"
            rm -f "/tmp/${ZIP}"
            if ! curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 -o "/tmp/${ZIP}" "${url}"; then
              echo "curl failed: ${url}"; echo "::endgroup::"; continue
            fi
            sz="$(stat -c%s "/tmp/${ZIP}")"
            echo "downloaded bytes=${sz} from ${url}"
            if [ "${sz}" -lt 50000000 ]; then
              echo "TRUNCATED (${sz} bytes < 50MB) from ${url}"; echo "::endgroup::"; continue
            fi
            actual="$(sha256sum "/tmp/${ZIP}" | cut -d' ' -f1)"
            if [ -n "${EXPECT}" ] && [ "${EXPECT}" != "${actual}" ]; then
              echo "SHA256 MISMATCH expect=${EXPECT} actual=${actual} from ${url}"; echo "::endgroup::"; continue
            fi
            echo "download verified (size+sha256); extracting"
            df -h /
            rm -rf node_modules/electron/dist
            mkdir -p node_modules/electron/dist
            if ! unzip -q "/tmp/${ZIP}" -d node_modules/electron/dist; then
              echo "UNZIP FAILED from ${url}"; df -h /; echo "::endgroup::"; continue
            fi
            chmod +x node_modules/electron/dist/electron || true
            printf 'electron' > node_modules/electron/path.txt
            if electron_ok; then
              echo "INSTALLED OK from ${url}"; echo "::endgroup::"; break
            fi
            echo "post-extract check failed from ${url}"; echo "::endgroup::"
          done
          df -h /
          ls -la node_modules/electron/dist | head -12
          electron_ok
          node -e "const p=require('electron'); require('node:fs').accessSync(p); console.log('electron binary OK:', p)"

      # Save only a COMPLETE install: the prior step asserts electron_ok and
      # fails (skipping this step) otherwise, so reaching here means the binary
      # is good — a truncated download can never poison the cache. Subsequent
      # runs then restore it from GitHub infra, immune to the egress cap.
      - name: Save Electron binary cache
        if: github.event_name == 'pull_request' && steps.electron-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules/electron/dist
            node_modules/electron/path.txt
          key: ${{ steps.electron-cache.outputs.cache-primary-key }}

      # This spec drives the BUILT Electron app via Playwright's _electron API
      # (electronApp.evaluate / page.evaluate); it never uses Playwright's bundled
      # chromium. `install --with-deps chromium` downloaded that unused ~170MB
      # browser, and that CDN download stalled past the 30-min job cap on every
      # run (the spec never even started). Install only the system libraries that
      # Electron's chromium needs at runtime - no browser binary download.
      - name: Install Playwright system deps (no browser download - Electron-only spec)
        run: bunx playwright install-deps chromium

      # This job does a fast UNPACKAGED electron-vite build (no electron-builder
      # packaging). The e2e fixture defaults to PACKAGED mode in CI and looks for
      # a packaged app under out/, which this job never produces. Force DEV mode
      # so the spec launches the unpackaged build via `electron .`. The security
      # properties under test (sandbox, contextIsolation, nodeIntegration:false,
      # IPC handler registration, electron version) are identical in dev and
      # packaged mode.
      # Electron is a GUI app: on the headless runner it aborts at startup with
      # "Missing X server or $DISPLAY -> The platform failed to initialize.
      # Exiting", so Playwright's _electron.launch never gets a window and times
      # out after 60s (#361, surfaced once the binary install was fixed). Run
      # under xvfb (preinstalled on ubuntu runners) to give it a virtual display.
      - name: Run security-audit e2e spec
        env:
          E2E_DEV: '1'
        run: xvfb-run -a bunx playwright test tests/e2e/specs/security-audit-verification.e2e.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pr-checks-playwright-report
          path: tests/e2e/report
          if-no-files-found: ignore
          retention-days: 7

  # Job 6: Test release scripts (fast, no build required)
  release-script-test:
    name: Release Script Test
    needs: resolve-pr-context
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}
          persist-credentials: false

      - name: Create mock build artifacts
        shell: bash
        run: bash scripts/create-mock-release-artifacts.sh build-artifacts

      - name: Run prepare-release-assets script
        shell: bash
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Validate script output
        shell: bash
        run: bash scripts/verify-release-assets.sh release-assets
