name: 'Gather PR Diff'
description: 'Fetch PR diff, changed file list, and statistics via GitHub API'

inputs:
  pr_number:
    description: 'PR number (required for workflow_dispatch triggers)'
    required: false
    default: ''

outputs:
  skip:
    description: 'Whether to skip processing (empty diff)'
    value: '${{ steps.gather.outputs.skip }}'
  pr_number:
    description: 'Resolved PR number'
    value: '${{ steps.gather.outputs.pr_number }}'
  base_sha:
    description: 'Immutable PR base commit used for the gathered inputs'
    value: '${{ steps.gather.outputs.base_sha }}'
  head_sha:
    description: 'Immutable PR head commit used for the gathered inputs'
    value: '${{ steps.gather.outputs.head_sha }}'
  additions:
    description: 'Total lines added'
    value: '${{ steps.gather.outputs.additions }}'
  deletions:
    description: 'Total lines deleted'
    value: '${{ steps.gather.outputs.deletions }}'
  total_lines:
    description: 'Total lines changed (additions + deletions)'
    value: '${{ steps.gather.outputs.total_lines }}'
  file_count:
    description: 'Number of changed files'
    value: '${{ steps.gather.outputs.file_count }}'
  diff_truncated:
    description: 'Whether the diff was truncated'
    value: '${{ steps.gather.outputs.diff_truncated }}'

runs:
  using: 'composite'
  steps:
    - id: 'gather'
      uses: 'actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b' # v7.1.0
      env:
        INPUT_PR_NUMBER: '${{ inputs.pr_number }}'
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const tmpDir = fs.realpathSync(process.env.RUNNER_TEMP || '/tmp');

          function writeExclusiveTempFile(filename, contents) {
            if (filename !== path.basename(filename)) {
              throw new Error('Refusing a nested temporary output path');
            }
            const outputPath = path.resolve(tmpDir, filename);
            if (path.dirname(outputPath) !== tmpDir) {
              throw new Error('Temporary output resolves outside RUNNER_TEMP');
            }
            const noFollow = fs.constants.O_NOFOLLOW ?? 0;
            const flags = fs.constants.O_WRONLY | fs.constants.O_CREAT | fs.constants.O_EXCL | noFollow;
            const fd = fs.openSync(outputPath, flags, 0o600);
            try {
              const opened = fs.fstatSync(fd);
              if (!opened.isFile() || opened.nlink !== 1) {
                throw new Error('Temporary output is not an exclusive regular file');
              }
              fs.writeFileSync(fd, contents);
            } finally {
              fs.closeSync(fd);
            }
          }

          // Support both PR event trigger and manual workflow_dispatch
          const prNumber = context.payload.pull_request?.number
            || Number(process.env.INPUT_PR_NUMBER)
            || null;

          if (!prNumber) {
            core.setFailed('No PR number found. Provide pr_number input for manual trigger.');
            return;
          }

          core.setOutput('pr_number', String(prNumber));

          async function getPullShas() {
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const baseSha = String(pullRequest.base?.sha || '');
            const headSha = String(pullRequest.head?.sha || '');
            if (!/^[0-9a-f]{40}$/.test(baseSha) || !/^[0-9a-f]{40}$/.test(headSha)) {
              throw new Error('PR base and head must resolve to full commit SHAs');
            }
            return { baseSha, headSha };
          }

          const { baseSha, headSha } = await getPullShas();
          const basehead = `${baseSha}...${headSha}`;

          // Both responses are derived from the same immutable commit pair.
          const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
            owner: context.repo.owner,
            repo: context.repo.repo,
            basehead,
          });
          const allFiles = Array.isArray(comparison.files) ? comparison.files : [];
          if (allFiles.length >= 300) {
            core.setFailed("Comparison reached GitHub's 300 changed files cap; manual review is required.");
            return;
          }

          const { data: diff } = await github.request('GET /repos/{owner}/{repo}/compare/{basehead}', {
            owner: context.repo.owner,
            repo: context.repo.repo,
            basehead,
            headers: { accept: 'application/vnd.github.diff' },
          });

          if (!diff || String(diff).trim().length === 0) {
            core.warning('PR has an empty diff, skipping');
            core.setOutput('skip', 'true');
            return;
          }

          const current = await getPullShas();
          if (current.baseSha !== baseSha || current.headSha !== headSha) {
            core.setFailed('PR base or head changed while gathering review inputs; retry the action.');
            return;
          }

          const additions = allFiles.reduce((s, f) => s + f.additions, 0);
          const deletions = allFiles.reduce((s, f) => s + f.deletions, 0);
          const totalLines = additions + deletions;

          // Truncate diff to 100K characters
          const MAX_DIFF = 100000;
          const diffStr = String(diff);
          const diffTruncated = diffStr.length > MAX_DIFF;
          const truncatedDiff = diffTruncated
            ? diffStr.substring(0, MAX_DIFF) + '\n\n... [diff truncated at 100K chars]'
            : diffStr;

          // Build compact file list
          const fileList = allFiles.map(f => ({
            filename: f.filename,
            status: f.status,
            additions: f.additions,
            deletions: f.deletions,
          }));

          // Write large data to temp files (avoid output size limits)
          writeExclusiveTempFile('pr_diff.txt', truncatedDiff);
          writeExclusiveTempFile('file_list.json', JSON.stringify(fileList));
          writeExclusiveTempFile('pr_head_sha.txt', headSha);

          // Only small values as step outputs
          core.setOutput('skip', 'false');
          core.setOutput('base_sha', baseSha);
          core.setOutput('head_sha', headSha);
          core.setOutput('additions', String(additions));
          core.setOutput('deletions', String(deletions));
          core.setOutput('total_lines', String(totalLines));
          core.setOutput('file_count', String(allFiles.length));
          core.setOutput('diff_truncated', String(diffTruncated));
